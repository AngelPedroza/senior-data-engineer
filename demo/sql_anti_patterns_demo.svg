<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 956 454" width="956" height="454" role="img" aria-label="Terminal output: senior-data-engineer sql_anti_patterns.py demo">
  <rect width="956" height="454" rx="8" fill="#1a1b26"/>
  <circle cx="20" cy="22" r="6" fill="#f7768e"/>
<circle cx="40" cy="22" r="6" fill="#e0af68"/>
<circle cx="60" cy="22" r="6" fill="#9ece6a"/>
<text x="50%" y="26" fill="#565f89" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" text-anchor="middle">senior-data-engineer — sql_anti_patterns.py</text>

  <text x="16" y="56" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#7aa2f7">$ </tspan><tspan fill="#c0caf5">python scripts/sql_anti_patterns.py demo/dirty_model.sql</tspan></text>
  <text x="16" y="74" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"></text>
  <text x="16" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#565f89">Scanned 1 SQL files.</tspan></text>
  <text x="16" y="110" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#e0af68">[WARN ]</tspan><tspan fill="#c0caf5"> </tspan><tspan fill="#7aa2f7">demo/dirty_model.sql:4</tspan><tspan fill="#c0caf5">  </tspan><tspan fill="#9ece6a">select-star</tspan></text>
  <text x="16" y="128" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#c0caf5">        SELECT * in a model. Name every column you need; protects against upstream schema changes and cuts scan cost.</tspan></text>
  <text x="16" y="146" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#565f89">        &gt; SELECT *</tspan></text>
  <text x="16" y="164" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"></text>
  <text x="16" y="182" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#f7768e">[ERROR]</tspan><tspan fill="#c0caf5"> </tspan><tspan fill="#7aa2f7">demo/dirty_model.sql:11</tspan><tspan fill="#c0caf5">  </tspan><tspan fill="#9ece6a">row-number-as-key</tspan></text>
  <text x="16" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#c0caf5">        ROW_NUMBER() used as surrogate key. Non-deterministic across runs; use a deterministic hash (e.g. dbt_utils.generate_surrogate_key).</tspan></text>
  <text x="16" y="218" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#565f89">        &gt; ROW_NUMBER() OVER (ORDER BY updated_at) AS order_sk,</tspan></text>
  <text x="16" y="236" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"></text>
  <text x="16" y="254" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#e0af68">[WARN ]</tspan><tspan fill="#c0caf5"> </tspan><tspan fill="#7aa2f7">demo/dirty_model.sql:5</tspan><tspan fill="#c0caf5">  </tspan><tspan fill="#9ece6a">hardcoded-schema</tspan></text>
  <text x="16" y="272" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#c0caf5">        Hardcoded fully-qualified name. In dbt projects, prefer ref() / source() so environments stay isolated.</tspan></text>
  <text x="16" y="290" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#565f89">        &gt; FROM ANALYTICS.RAW.ORDERS</tspan></text>
  <text x="16" y="308" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"></text>
  <text x="16" y="326" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#e0af68">[WARN ]</tspan><tspan fill="#c0caf5"> </tspan><tspan fill="#7aa2f7">demo/dirty_model.sql:14</tspan><tspan fill="#c0caf5">  </tspan><tspan fill="#9ece6a">now-in-logic</tspan></text>
  <text x="16" y="344" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#c0caf5">        Using CURRENT_DATE / NOW() / SYSDATE inside a model breaks idempotency. Parameterize by the orchestrator-provided interval boundary.</tspan></text>
  <text x="16" y="362" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#565f89">        &gt; CURRENT_TIMESTAMP AS loaded_at,</tspan></text>
  <text x="16" y="380" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"></text>
  <text x="16" y="398" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#e0af68">[WARN ]</tspan><tspan fill="#c0caf5"> </tspan><tspan fill="#7aa2f7">demo/dirty_model.sql:6</tspan><tspan fill="#c0caf5">  </tspan><tspan fill="#9ece6a">where-1-equals-1</tspan></text>
  <text x="16" y="416" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#c0caf5">        WHERE 1=1 with no additional conditions is a debugging leftover. Remove or complete.</tspan></text>
  <text x="16" y="434" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" xml:space="preserve"><tspan fill="#565f89">        &gt; WHERE 1=1</tspan></text>
</svg>
